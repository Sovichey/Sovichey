name: Generate Snake

on:
  schedule:
    # Runs every 24 hours at midnight
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Generates the snake with cyan body and nice vibrant green food dots
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#0891B2&color_dots=#1C1917,#14532d,#166534,#22c55e,#4ade80
            dist/github-contribution-grid-snake-dark.svg?color_snake=#0891B2&color_dots=#1C1917,#14532d,#166534,#22c55e,#4ade80
          
      # Pushes the generated SVGs to the 'output' branch automatically
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
